<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sierra para Melamina LU3F - Freud | WoodTools</title>
    <link rel="stylesheet" href="../../../styles.css">
    <link rel="stylesheet" href="../../CSS/styles.css">
    <link rel="stylesheet" href="../../CSS/producto-detalle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <main class="producto-container">
        <div class="producto-imagen">
            <img src="../../../imagenes/herramientas/Sierras/LU3F 0100/1 (2).jpg" alt="LU3F">
        </div>
        <div class="producto-info">
            <h1 id="producto-titulo">Sierra para Melamina LU3F</h1>
            <p class="marca">Marca: Freud</p>
            <div class="selector-modelo" style="margin: 25px 0;">
                <label for="variante-selector" style="font-weight: bold; display: block; margin-bottom: 10px;">Seleccioná la Medida:</label>
                <select id="variante-selector" style="width: 100%; padding: 12px; border: 2px solid #ccc; border-radius: 8px; font-size: 1rem;">
                    <option value="" disabled selected>-- Elegí una medida --</option>
                    <option value="LU3F 0100 (220mm - 64 dientes)">LU3F 0100 - 220mm | 64 dientes</option>
                    <option value="LU3F 0200 (250mm - 80 dientes)">LU3F 0200 - 250mm | 80 dientes</option>
                    <option value="LU3F 0300 (300mm - 96 dientes)">LU3F 0300 - 300mm | 96 dientes</option>
                    <option value="LU3F 0400 (350mm - 108 dientes)">LU3F 0400 - 350mm | 108 dientes</option>
                </select>
            </div>
            <button id="btn-whatsapp" class="btn-comprar" style="background-color: #25D366; color: white; padding: 15px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; border: none; display: flex; align-items: center; justify-content: center;">
                <img src="../../../imagenes/logos/Whatsapp.png" alt="WA" style="width: 20px; margin-right: 10px;"> Consultar Precio
            </button>
        </div>
    </main>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const btn = document.getElementById("btn-whatsapp");
            const sel = document.getElementById("variante-selector");
            const tit = document.getElementById("producto-titulo").innerText;
            btn.addEventListener("click", function() {
                if (sel.value === "") { alert("Seleccioná una medida"); return; }
                const msg = encodeURIComponent("Hola WoodTools! Me interesa la " + tit + " en medida: " + sel.value);
                window.open("https://wa.me/5491134609057?text=" + msg, "_blank");
            });
        });
    </script>
</body>
</html>
